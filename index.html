<title>HealthMe™ — Prototype</title>
<style>
/* ── Palette « Vitalité » ─────────────────────── */
:root{
  --mand:#F2913F; --mand-fonce:#DE7E2C;
  --soleil:#FBC97D; --soleil-pale:#FDEBD2;
  --corail:#EE6A4D;
  --sarc:#155E63; --sarc-pale:#E3EEEF;
  --creme:#FCF7EF; --blanc:#FFFFFF;
  --encre:#2A211A; --gris:#6B625A;
  --ombre:0 2px 10px rgba(42,33,26,.08);
  --rayon:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--creme); color:var(--encre);
  font-size:1.0625rem; line-height:1.55;
  /* Coquille d'app iOS : pas de défilement de page, pas d'effet élastique Safari */
  position:fixed; inset:0; width:100%; overflow:hidden; overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
  -webkit-user-select:none; user-select:none; touch-action:manipulation;
}
input,textarea{-webkit-user-select:text;user-select:text}
.app{max-width:520px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--creme)}

/* ── En-tête ──────────────────────────────────── */
header{
  display:flex;align-items:center;gap:.65rem;flex:none;
  /* Safe area haute : encoche / Dynamic Island de l'iPhone */
  padding:calc(.85rem + env(safe-area-inset-top)) 1.1rem .85rem;
  background:var(--creme);z-index:20;border-bottom:1px solid #F0E6D8;
}
header .brand{font-weight:800;font-size:1.35rem;color:var(--encre);letter-spacing:-.01em}
header .brand .tm{font-size:.6em;vertical-align:super}
header .points{
  margin-left:auto;background:var(--soleil-pale);color:var(--sarc);
  font-weight:700;font-size:.95rem;padding:.3rem .8rem;border-radius:999px;
  border:1px solid var(--soleil);
}

/* ── Contenu ──────────────────────────────────── */
main{
  flex:1;padding:1.1rem 1.1rem 1.5rem;
  /* Seule zone défilante, avec inertie iOS */
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
}
.screen{display:none}
.screen.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h1{font-size:1.5rem;line-height:1.25;color:var(--encre);margin-bottom:.5rem}
h2{font-size:1.2rem;color:var(--sarc);margin:1.4rem 0 .6rem}
h3{font-size:1.05rem;color:var(--encre);margin-bottom:.3rem}
p{margin-bottom:.7rem}
.muted{color:var(--gris);font-size:.95rem}
.small{font-size:.9rem}
a{color:var(--sarc);font-weight:600}

.card{
  background:var(--blanc);border-radius:var(--rayon);
  padding:1.1rem 1.15rem;margin-bottom:.9rem;box-shadow:var(--ombre);
}
.card.sable{background:var(--soleil-pale);box-shadow:none;border:1px solid var(--soleil)}
.card.sarcelle{background:var(--sarc);color:var(--blanc)}
.card.sarcelle h3,.card.sarcelle .muted{color:rgba(255,255,255,.85)}

/* ── Boutons ──────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  border:none;border-radius:999px;cursor:pointer;
  font-size:1.05rem;font-weight:700;font-family:inherit;
  padding:.8rem 1.6rem;transition:transform .08s ease,background .15s;
}
.btn:active{transform:scale(.97)}
.btn-primaire{background:var(--mand);color:#fff}
.btn-primaire:hover{background:var(--mand-fonce)}
.btn-secondaire{background:var(--sarc);color:#fff}
.btn-contour{background:transparent;color:var(--sarc);border:2px solid var(--sarc)}
.btn-bloc{width:100%;margin-top:.5rem}
.btn-petit{font-size:.92rem;padding:.45rem 1rem}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── Formulaires ──────────────────────────────── */
label{display:block;font-weight:700;font-size:.98rem;margin:.9rem 0 .35rem;color:var(--sarc)}
input[type=text],input[type=number],select{
  width:100%;padding:.7rem .9rem;font-size:1.05rem;font-family:inherit;
  border:2px solid #E8DCC9;border-radius:12px;background:var(--blanc);color:var(--encre);
}
input:focus,select:focus{outline:3px solid var(--soleil);border-color:var(--mand)}
.seg{display:flex;flex-wrap:wrap;gap:.5rem}
.seg button{
  flex:1 1 auto;min-width:90px;padding:.6rem .5rem;border-radius:12px;cursor:pointer;
  border:2px solid #E8DCC9;background:var(--blanc);color:var(--encre);
  font-size:.98rem;font-weight:600;font-family:inherit;
}
.seg button.on{background:var(--sarc);border-color:var(--sarc);color:#fff}
.check{display:flex;gap:.6rem;align-items:flex-start;margin:.6rem 0;font-size:.98rem}
.check input{width:1.3rem;height:1.3rem;margin-top:.2rem;accent-color:var(--mand);flex:none}

/* ── Étapes (onboarding) ──────────────────────── */
.dots{display:flex;gap:.4rem;justify-content:center;margin:.2rem 0 1.2rem}
.dots span{width:.6rem;height:.6rem;border-radius:50%;background:#E8DCC9}
.dots span.on{background:var(--mand);width:1.6rem;border-radius:999px}

/* ── Barres de progression ────────────────────── */
.jauge{margin:.7rem 0}
.jauge .tete{display:flex;justify-content:space-between;font-size:.95rem;font-weight:600;margin-bottom:.25rem}
.jauge .tete .val{color:var(--gris);font-weight:600}
.barre{height:.7rem;background:#F0E6D8;border-radius:999px;overflow:hidden}
.barre i{display:block;height:100%;background:var(--mand);border-radius:999px;transition:width .4s ease}
.barre i.plein{background:var(--sarc)}

/* ── Puces / badges ───────────────────────────── */
.chip{
  display:inline-block;padding:.2rem .7rem;border-radius:999px;
  font-size:.85rem;font-weight:700;
}
.chip-attention{background:var(--soleil-pale);color:#8a5a15;border:1px solid var(--soleil)}
.chip-prio{background:#FDEAE5;color:#B04124;border:1px solid var(--corail)}
.chip-ok{background:var(--sarc-pale);color:var(--sarc);border:1px solid var(--sarc)}
.equiv{
  display:inline-block;background:var(--sarc-pale);color:var(--sarc);
  border-radius:8px;padding:.1rem .5rem;font-size:.88rem;font-weight:600;
}

/* ── Banque de repas ──────────────────────────── */
.repas{
  display:flex;gap:.8rem;align-items:center;background:var(--blanc);
  border-radius:14px;padding:.75rem .9rem;margin-bottom:.55rem;
  box-shadow:var(--ombre);cursor:pointer;border:2px solid transparent;
}
.repas:hover{border-color:var(--soleil)}
.repas:active{transform:scale(.98);border-color:var(--soleil)}
.seg button:active,nav button:active{opacity:.6}
.repas .ico{font-size:1.7rem;flex:none}
.repas .inf{flex:1;min-width:0}
.repas .inf b{display:block;font-size:1rem}
.repas .inf span{font-size:.85rem;color:var(--gris)}
.repas .kc{font-weight:700;color:var(--sarc);font-size:.92rem;flex:none}

/* ── Alertes ──────────────────────────────────── */
.alerte{border-left:5px solid var(--soleil);background:var(--blanc);border-radius:12px;padding:.9rem 1rem;margin-bottom:.8rem;box-shadow:var(--ombre)}
.alerte.cible{border-left-color:var(--corail)}
.alerte .titre{display:flex;align-items:center;gap:.5rem;font-weight:800;margin-bottom:.3rem}
.alerte p{font-size:.95rem;margin-bottom:.4rem}
.reco{background:var(--soleil-pale);border-radius:10px;padding:.6rem .8rem;font-size:.93rem;margin-top:.4rem}
.reco b{color:var(--sarc)}

/* ── Navigation basse ─────────────────────────── */
nav{
  display:none;flex:none;z-index:20;
  /* Tab bar translucide façon iOS */
  background:rgba(255,255,255,.9);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-top:1px solid #F0E6D8;
  padding:.35rem .4rem calc(.35rem + env(safe-area-inset-bottom));
}
nav.visible{display:flex}
nav button{
  flex:1;background:none;border:none;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:.1rem;
  font-size:.72rem;font-weight:700;color:var(--gris);padding:.35rem 0;border-radius:10px;
}
nav button .i{font-size:1.35rem;line-height:1}
nav button.on{color:var(--mand)}
nav button.on .i{transform:scale(1.1)}

/* ── Avertissement permanent ──────────────────── */
.avert{
  flex:none;background:var(--sarc);color:rgba(255,255,255,.92);
  font-size:.8rem;text-align:center;line-height:1.4;
  /* Safe area basse (barre home) quand la tab bar est cachée (onboarding) */
  padding:.45rem .8rem calc(.45rem + env(safe-area-inset-bottom));
}
.app:has(nav.visible) .avert{padding-bottom:.45rem}

/* ── Modale & toast ───────────────────────────── */
.voile{position:fixed;inset:0;background:rgba(42,33,26,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
.voile.on{display:flex}
.modale{
  background:var(--creme);border-radius:22px 22px 0 0;
  padding:1.3rem 1.2rem calc(1.6rem + env(safe-area-inset-bottom));
  width:100%;max-width:520px;max-height:85vh;overflow:auto;-webkit-overflow-scrolling:touch;
}
/* Feuille qui glisse depuis le bas, courbe « spring » iOS + poignée */
.voile.on .modale{animation:sheet .34s cubic-bezier(.32,.72,0,1)}
@keyframes sheet{from{transform:translateY(100%)}to{transform:none}}
.modale::before{content:'';display:block;width:36px;height:5px;border-radius:3px;background:#D8CCBA;margin:0 auto .9rem}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(5.5rem + env(safe-area-inset-bottom));z-index:60;
  background:var(--sarc);color:#fff;padding:.8rem 1.3rem;border-radius:14px;
  font-weight:700;font-size:.98rem;box-shadow:0 6px 20px rgba(0,0,0,.25);
  opacity:0;pointer-events:none;transition:opacity .3s;max-width:90%;text-align:center;
}
.toast.on{opacity:1}
.toast.bravo{background:var(--mand)}

/* ── Divers ───────────────────────────────────── */
.ligne{display:flex;gap:.8rem}
.ligne>*{flex:1}
.centre{text-align:center}
.logo-hero{margin:1.6rem auto 1rem;display:block}
.tuiles{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.6rem 0}
.tuile{background:var(--blanc);border-radius:14px;padding:.85rem;box-shadow:var(--ombre);text-align:center}
.tuile .gros{font-size:1.45rem;font-weight:800;color:var(--sarc)}
.tuile .lab{font-size:.83rem;color:var(--gris);font-weight:600}
.sep{border:none;border-top:1px solid #F0E6D8;margin:1.1rem 0}
.assiette{display:flex;border-radius:12px;overflow:hidden;height:2.6rem;margin:.5rem 0;font-size:.8rem;font-weight:700;color:#fff;text-align:center}
.assiette .a1{background:var(--sarc);width:50%;display:flex;align-items:center;justify-content:center}
.assiette .a2{background:var(--mand);width:25%;display:flex;align-items:center;justify-content:center}
.assiette .a3{background:var(--corail);width:25%;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="app">

// ── Logo option B « Le Rayonnement » : personnage + 12 éclats orangés ──
function logoSvg(fig, rayons){
  let r='';
  for(let k=0;k<12;k++){
    const a=k*Math.PI/6 + Math.PI/12;
    const x1=Math.cos(a)*20.5, y1=Math.sin(a)*20.5, x2=Math.cos(a)*27, y2=Math.sin(a)*27;
    r+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${rayons}" stroke-width="3" stroke-linecap="round"/>`;
  }
  return r
    +`<circle cx="0" cy="-10.5" r="5" fill="${fig}"/>`
    +`<path d="M -8.5 -3 L 8.5 13 M 8.5 -3 L -8.5 13" stroke="${fig}" stroke-width="5" stroke-linecap="round" fill="none"/>`;
}

// ═══ CALCULS DÉTERMINISTES (repris de nutriref-standalone-v2.html — ne jamais confier à un LLM) ═══
const PAL={sedentaire:1.2,leger:1.375,modere:1.55,actif:1.725,tres_actif:1.9};
const PA_PED={homme:{sedentaire:1.00,leger:1.13,modere:1.26,actif:1.42,tres_actif:1.42},
              femme:{sedentaire:1.00,leger:1.16,modere:1.31,actif:1.56,tres_actif:1.56}};
function eerChild(sex,age,w,hCm,act){
  const hM=hCm/100, dep=age<=8?20:25, pa=PA_PED[sex][act];
  return sex==='homme' ? 88.5-61.9*age+pa*(26.7*w+903*hM)+dep : 135.3-30.8*age+pa*(10.0*w+934*hM)+dep;
}
function defaultMeasures(sex,age){
  const T={homme:[{m:13,w:45,h:156},{m:18,w:64,h:175},{m:30,w:80,h:178},{m:50,w:82,h:177},{m:70,w:79,h:175},{m:100,w:74,h:172}],
           femme:[{m:13,w:44,h:154},{m:18,w:55,h:163},{m:30,w:65,h:165},{m:50,w:67,h:164},{m:70,w:66,h:162},{m:100,w:62,h:159}]};
  const r=T[sex].find(r=>age<=r.m)||T[sex][T[sex].length-1];
  return {weight:r.w,height:r.h};
}
function bmrCalc(sex,age,w,h){ return sex==='homme'?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161; }
function pick(t,sex,age){ const r=t.find(r=>age<=r.m)||t[t.length-1]; return sex==='homme'?r.h:r.f; }
function calcBesoins(age,sex,act,w,h,goal){
  const m={weight:w||defaultMeasures(sex,age).weight, height:h||defaultMeasures(sex,age).height};
  const ped=age<19;
  let maintenance;
  if(age>=19) maintenance=Math.round(bmrCalc(sex,age,m.weight,m.height)*PAL[act]);
  else maintenance=Math.round(eerChild(sex,age,m.weight,m.height,act));
  let cal=maintenance, goalApplied=ped?'maintien':goal;
  if(!ped){ if(goal==='perte')cal=Math.round(maintenance*.85); if(goal==='gain')cal=Math.round(maintenance*1.10); }
  cal=Math.max(cal, age<=13?1400:1200);
  const pF={sedentaire:1.1,leger:1.3,modere:1.5,actif:1.7,tres_actif:2.0}[act];
  const protG=Math.round(m.weight*pF);
  const fibres=pick([{m:13,h:31,f:26},{m:18,h:38,f:26},{m:50,h:38,f:25},{m:100,h:30,f:21}],sex,age);
  const eauMl=pick([{m:13,h:2400,f:2100},{m:18,h:3300,f:2300},{m:50,h:3700,f:2700},{m:100,h:3700,f:2700}],sex,age);
  const fer=pick([{m:13,h:8,f:8},{m:18,h:11,f:15},{m:50,h:8,f:18},{m:100,h:8,f:8}],sex,age);
  const calcium=pick([{m:18,h:1300,f:1300},{m:50,h:1000,f:1000},{m:70,h:1000,f:1200},{m:100,h:1200,f:1200}],sex,age);
  return {calories:cal,protG,fibres,eauMl,fer,calcium,fl:400,goalApplied,ped,mesures:m};
}

function toast(msg,bravo){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast on'+(bravo?' bravo':'');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('on'),2600);
}

function fermerModale(){ document.getElementById('voile').classList.remove('on'); }
document.getElementById('voile').addEventListener('click',e=>{ if(e.target.id==='voile') fermerModale(); });

// ═══ TOTAUX DU JOUR ══════════════════════════════
function totaux(){
  const t={kcal:0,prot:0,fib:0,fer:0,ca:0,fl:0};
  S.repas.forEach(id=>{ const r=BANQUE.find(x=>x.id===id); if(r){t.kcal+=r.kcal;t.prot+=r.prot;t.fib+=r.fib;t.fer+=r.fer;t.ca+=r.ca;t.fl+=r.fl;} });
  t.fer=Math.round(t.fer*10)/10; return t;
}
function minutesJour(){ return S.activites.reduce((s,a)=>s+a.min,0); }

const NB_ETAPES=6;
function rendOnboarding(){
  $nav.classList.remove('visible');
  document.getElementById('pointsBadge').hidden=true;
  const e=S.etape;
  if(e===0) return rendAccueil();
  if(e===1) return rendConsentements();
  if(e===2) return rendFormProfil();
  if(e===3) return rendBaseline();
  if(e===4) return rendAutoEval();
  if(e===5) return rendPointDepart();
}

function validerConsent(){
  const p=document.getElementById('c-profil').checked, j=document.getElementById('c-journal').checked;

  S.consentements={profil:p,journal:j,photos:document.getElementById('c-photos').checked,social:document.getElementById('c-social').checked};
  allerEtape(2);
}

}

const NOMS_NUTR={fer:'fer',calcium:'calcium',prot:'protéines',fib:'fibres',fl:'fruits et légumes'};
function ecartsActifs(){
  const t=totaux(), b=S.besoins, seuil=.6, res=[];
  if(S.repas.length===0) return res; // pas d'alarme sur journal vide
  if(t.fer < b.fer*seuil) res.push('fer');
  if(t.ca < b.calcium*seuil) res.push('calcium');
  if(t.prot < b.protG*seuil) res.push('prot');
  if(t.fib < b.fibres*seuil) res.push('fib');
  if(t.fl < b.fl*seuil) res.push('fl');
  return res;
}
function recoChiffree(k,ecart){
  return RECO_ALIMENTS[k].map(o=>{
    const nb=Math.max(1,Math.ceil(ecart/o.t));
    return `<b>${o.a}</b> ${o.q?`— ${o.q}`:''} (≈ ${o.t} ${o.u}${nb>1?` ; ~${nb} portions pour combler l'écart`:''})`;
  }).join('<br>');
}

  const p=S.profil, t=totaux(), b=S.besoins, ecarts=ecartsActifs();

    ecarts.map(k=>{ const [v,max,u]=valeurs[k]; const ecart=Math.round((max-v)*10)/10;
      return `<div class="alerte cible">
      <div class="titre">📌 ${NOMS_NUTR[k].charAt(0).toUpperCase()+NOMS_NUTR[k].slice(1)} — écart à combler</div>
      <p>Votre apport en ${NOMS_NUTR[k]} est sous le repère aujourd'hui : <b>${v} / ${max} ${u}</b> (écart ≈ ${ecart} ${u}).</p>
      <div class="reco"><b>Pour combler l'écart :</b><br>${recoChiffree(k,ecart)}</div>
      <p class="small muted" style="margin:.4rem 0 0">Consignez l'un de ces aliments au journal → l'écart se recalcule automatiquement.</p>
      </div>`; }).join('')}
  ${S.repas.length>0 && minAct<cible.min?`<div class="alerte">
    <div class="titre">🏃 Activité physique</div>
    <p>Il vous reste <b>${cible.min-minAct} min</b> pour atteindre le repère ${cible.type==='jour'?'du jour':'de la semaine'} (${cible.min} min). Une marche rapide compte!</p>
  </div>`:''}
  <h2>Sensibilisation — ${BASELINE[p.groupe].titre}</h2>

    <div class="titre">${c.ico} ${c.n}</div><p>${c.msg}</p>

  </div>`).join('')}

}

  $main.innerHTML=`
  <h1>Profil</h1>
  <div class="card">
    <h3>${esc(p.prenom)}</h3>
    <p class="small">${p.age} ans · ${p.sex==='homme'?'Homme':'Femme'} · ${ACT_L[p.act]} · ${m.weight} kg · ${m.height} cm ${!p.poids?'<span class="muted">(moyennes utilisées)</span>':''}</p>
    <p class="small">Groupe d'âge : <b>${BASELINE[p.groupe].titre}</b> · Objectif : <b>${b.goalApplied}</b>${b.ped?' <span class="muted">(fixé — croissance d\'abord)</span>':''}</p>
  </div>
  <div class="card">
    <h3>Vos besoins quotidiens</h3>
    <div class="tuiles">
      <div class="tuile"><div class="gros">${b.calories}</div><div class="lab">kcal</div></div>
      <div class="tuile"><div class="gros">${b.protG} g</div><div class="lab">protéines</div></div>
      <div class="tuile"><div class="gros">${b.fibres} g</div><div class="lab">fibres</div></div>
      <div class="tuile"><div class="gros">${b.fer} mg</div><div class="lab">fer</div></div>
      <div class="tuile"><div class="gros">${b.calcium} mg</div><div class="lab">calcium</div></div>
      <div class="tuile"><div class="gros">${(b.eauMl/1000).toFixed(1)} L</div><div class="lab">eau ≈ ${Math.round(b.eauMl/250)} verres</div></div>
    </div>
    <p class="small muted">Mifflin-St Jeor × niveau d'activité · ANREF (Santé Canada). Calcul entièrement déterministe.</p>
  </div>
  <div class="card">
    <h3>Consentements</h3>
    <p class="small">Profil santé : ${S.consentements.profil?'✅':'—'} · Journal : ${S.consentements.journal?'✅':'—'} · Photos : ${S.consentements.photos?'✅':'Non'} · Social : ${S.consentements.social?'✅':'Non'}</p>
    <p class="small muted">Dans la version complète : modification, export et suppression du compte en tout temps (Loi 25).</p>
  </div>
  <button class="btn btn-contour btn-bloc" onclick="modifierProfil()">Modifier mon profil</button>
  <button class="btn btn-contour btn-bloc btn-petit" onclick="reinitialiser()" style="color:var(--gris);border-color:#D8CCBA">Réinitialiser le prototype</button>`;
}
function modifierProfil(){ S.etape=2; sauver(); rendOnboarding(); }
function reinitialiser(){
  modale(`<h2 style="margin-top:0">Tout effacer?</h2>
  <p class="small">Le profil, le journal et les points de ce prototype seront supprimés de cet appareil.</p>
  <button class="btn btn-primaire btn-bloc" onclick="localStorage.removeItem(CLE);location.reload()">Oui, réinitialiser</button>
  <button class="btn btn-contour btn-bloc btn-petit" onclick="fermerModale()">Annuler</button>`);
}

// ═══ DÉMARRAGE ══════════════════════════════════
charger();
if(S.etape===99 && S.profil && S.besoins) rendApp('tableau');
else { S.etape=Math.min(S.etape,5); rendOnboarding(); }
</script>
</body>
</html>
